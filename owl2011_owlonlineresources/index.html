{ id:"slide15", file:"videos/15_owl2011_owlonlineresources.mp4", next:"index.html", autoplay:true }
];

function pauseOthers(current){
  var vids = document.getElementsByTagName("video");
  for(var i=0;i<vids.length;i++){
    if(vids[i]!==current) vids[i].pause();
  }
}

slides.forEach(function(slide){

  var el = document.getElementById(slide.id);
  if(!el) return;

  el.innerHTML =
    '<video width="720" height="540" controls preload="metadata">' +
    '<source src="'+slide.file+'" type="video/mp4">' +
    '</video>';

  var video = el.querySelector("video");

  video.addEventListener("play", function(){ pauseOthers(video); });
  video.addEventListener("ended", function(){ window.location = slide.next; });

  if(slide.autoplay){
    video.addEventListener("canplay", function once(){
      video.removeEventListener("canplay", once);
      setTimeout(function(){ video.play().catch(function(){}); },1200);
    });
  }

});

})();
</script>
